<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Отчёт</title>
  <style>
    body { font-family: sans-serif; padding: 2rem; max-width: 900px; margin: auto; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 2rem; }
    th, td { border: 1px solid #ccc; padding: 8px 12px; text-align: left; }
    th { background: #f0f0f0; }
    h1 { color: #333; }
    h2 { color: #555; margin-top: 2rem; }
  </style>
</head>
<body>
  <h1>Отчёт по данным</h1>
  <p>Всего строк: <strong>100</strong></p>
  
  <h2>Числовые колонки</h2>
  <table>
    <thead>
      <tr><th>Колонка</th><th>Кол-во</th><th>Min</th><th>Max</th><th>Среднее</th></tr>
    </thead>
    <tbody>
  <tr>
    <td>year</td>
    <td>100</td>
    <td>2010.00</td>
    <td>2024.00</td>
    <td>2016.55</td>
  </tr>
  <tr>
    <td>price</td>
    <td>100</td>
    <td>5102.11</td>
    <td>49898.24</td>
    <td>26322.82</td>
  </tr></tbody>
  </table>
  
  <h2>Колонка: BRAND</h2>
  <table>
    <thead><tr><th>Значение</th><th>Кол-во</th></tr></thead>
    <tbody><tr><td>Ford</td><td>28</td></tr><tr><td>Tesla</td><td>22</td></tr><tr><td>Toyota</td><td>19</td></tr><tr><td>Lada</td><td>19</td></tr><tr><td>BMW</td><td>12</td></tr></tbody>
  </table>
  <h2>Колонка: color</h2>
  <table>
    <thead><tr><th>Значение</th><th>Кол-во</th></tr></thead>
    <tbody><tr><td>Black</td><td>30</td></tr><tr><td>White</td><td>24</td></tr><tr><td>Red</td><td>20</td></tr><tr><td>Silver</td><td>15</td></tr><tr><td>Blue</td><td>11</td></tr></tbody>
  </table>
</body>
</html>
